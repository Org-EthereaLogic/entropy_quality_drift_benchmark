name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests docs

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          fail_ci_if_error: true
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Upload coverage to Codacy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml

  docs:
    name: Docs (visual generation smoke test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (with docs extra)
        run: pip install -e ".[dev,docs]"

      - name: Regenerate visualizations
        run: python docs/generate_visuals.py

      - name: Verify images were generated
        run: |
          test -f docs/images/track_comparison.png
          test -f docs/images/gate_evaluation.png
          test -f docs/images/benchmark_verdict.png

      - name: Verify docs generation is idempotent on this runner
        shell: bash
        run: |
          first_hashes="$(sha256sum docs/images/*.png)"
          python docs/generate_visuals.py
          second_hashes="$(sha256sum docs/images/*.png)"
          test "$first_hashes" = "$second_hashes"

  package:
    name: Package (wheel smoke test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel into clean virtualenv
        run: |
          python -m venv /tmp/entropy-wheel-smoke
          /tmp/entropy-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/entropy-wheel-smoke/bin/pip install dist/*.whl

      - name: Run packaged benchmark smoke test
        run: |
          evidence_dir="$(mktemp -d)"
          /tmp/entropy-wheel-smoke/bin/python -m entropy_quality_drift.runners.benchmark \
            --seed 42 \
            --rows 1000 \
            --evidence-dir "$evidence_dir"
          ls "$evidence_dir"/bench_42_*.json

  security:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # master

      - name: Run Snyk code scan
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::warning::SNYK_TOKEN is not configured; skipping Snyk code scan."
            exit 0
          fi

          output_file="$(mktemp)"

          if snyk code test --severity-threshold=high >"$output_file" 2>&1; then
            cat "$output_file"
            rm -f "$output_file"
            exit 0
          else
            status=$?
          fi

          cat "$output_file"

          if grep -qiE '401|unauthorized|authentication failed|invalid api token|missing api token' "$output_file"; then
            echo "::warning::Snyk authentication failed; skipping code scan without failing CI."
            rm -f "$output_file"
            exit 0
          fi

          rm -f "$output_file"
          exit "$status"
